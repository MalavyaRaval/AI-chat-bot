<!DOCTYPE html>
<html>
<head>
    <title>Chat with Lobster-Bot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #bb86fc; }
        #chat-box { width: 100%; max-width: 500px; height: 400px; background-color: #1e1e1e; border: 1px solid #333; border-radius: 10px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #3700b3; color: white; }
        .bot { align-self: flex-start; background-color: #333; color: #e0e0e0; }
        .input-area { width: 100%; max-width: 500px; display: flex; gap: 10px; margin-top: 10px; }
        #user-input { flex-grow: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background-color: #333; color: white; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background-color: #bb86fc; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #9965f4; }
    </style>
</head>
<body>
    <h1>Lobster-Bot Terminal</h1>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask me something...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value;
            if (!message) return;
            const chatBox = document.getElementById('chat-box');
            
            chatBox.innerHTML += `<div class="message user">${message}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.innerHTML += `<div class="message bot">Error: Could not reach server.</div>`;
            }
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
